name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /data/docker/antprojects-landing
            git pull
            docker build -t antprojects-landing .
            docker stop landing || true
            docker rm landing || true
            docker run -d --name landing -p 3001:3000 --restart unless-stopped antprojects-landing
